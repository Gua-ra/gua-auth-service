name: CI/CD

# Gua normalized CI/CD pipeline.
#
# Builds ghcr.io/gua-ra/gua-auth-service from the repo Dockerfile and deploys it
# to the Gua k3s cluster. Pre-merge PR validation (rustfmt/clippy/cargo-deny/nextest/
# schema-drift/OPA/frontend) stays in the upstream ci.yaml ("CI"); this file does not
# replace it. This is the single canonical build+deploy pipeline for the Gua fork.
#
#   merge to main           => auto build + auto deploy to DEV
#   workflow_dispatch (dev) => build the triggering branch + deploy to DEV (QA)
#   workflow_dispatch (prod)=> build the triggering branch + deploy to PROD
#                              (gated by the `production` GitHub Environment reviewer)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/gua-ra/gua-auth-service

jobs:
  # Rust build + test gate. Mirrors the upstream MAS test invocation (nextest, with
  # the frontend and OPA policies built first) so we never ship an image that fails
  # the suite. Adapts ONLY the build/test step to this repo's language; the
  # trigger + job skeleton below is identical to the other Gua services.
  build:
    name: Test and build image
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}

    services:
      postgres:
        image: docker.io/library/postgres:15.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - "5432:5432"

    steps:
      # Checkout the TRIGGERING ref (main on push, the chosen branch on dispatch).
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # Build the web frontend (pnpm --filter mas-frontend) and the OPA policies
      # (make test in policies/) that the test suite and the image both need.
      - uses: ./.github/actions/build-frontend
      - uses: ./.github/actions/build-policies

      - name: Run test suite
        run: cargo nextest run --workspace
        env:
          # SQLX_OFFLINE is compile-time only; #[sqlx::test] needs a live DB at runtime.
          # Points at the `postgres` service above (mapped to localhost:5432), same as ci.yaml.
          SQLX_OFFLINE: "1"
          DATABASE_URL: postgresql://postgres:postgres@localhost/postgres

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Immutable, fully-qualified image ref consumed by the deploy jobs.
      - id: ref
        run: echo "ref=${IMAGE}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Image tags
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # AUTOMATIC on merge to main; also manually dispatchable (environment=dev) to roll
  # any branch onto dev for QA.
  deploy-dev:
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    # Unique label → routes ONLY to the in-cluster scoped-SA pod runner
    # (k8s/cicd/gua-auth-deploy-runner.yaml in gua-deploy), never a privileged host runner.
    runs-on: [self-hosted, gua-auth-incluster]
    environment: dev
    steps:
      - name: Roll out ${{ needs.build.outputs.ref }} to dev
        run: |
          IMG="${{ needs.build.outputs.ref }}"
          # Runs on the in-cluster gua-auth-deploy-runner pod (ServiceAccount gua-auth-deployer,
          # scoped to patch ONLY this deployment), so plain kubectl uses the in-cluster config —
          # no sudo/k3s on the node. k8s pulls the immutable sha-tagged image from GHCR via the
          # ghcr-pull secret (imagePullPolicy: IfNotPresent + imagePullSecrets).
          #
          # The private fork image needs the ghcr-pull pull secret attached. The chart owns this
          # durably (gua-deploy#17, applied on the next helm upgrade); until that helm workflow is
          # wired up, ensure it here so the pipeline is self-sufficient. Idempotent — a no-op once set.
          kubectl -n gua patch deployment/gua-matrix-authentication-service --type=merge \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-pull"}]}}}}'
          kubectl -n gua set image deployment/gua-matrix-authentication-service matrix-authentication-service="$IMG"
          kubectl -n gua rollout status deployment/gua-matrix-authentication-service --timeout=180s

  # MANUAL GATE: only via workflow_dispatch with environment=prod.
  # NOT YET FUNCTIONAL — prod is scaffold until two things exist: (1) the `production`
  # GitHub Environment has a *required reviewer* added (Settings → Environments → production;
  # today it has only a branch policy, so it would NOT pause for approval), and (2) a
  # prod-labelled in-cluster scoped runner exists. Until both are set up, a prod dispatch
  # queues with no runner. Do not rely on this path yet.
  deploy-prod:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    runs-on: [self-hosted, gua-auth-incluster-prod]
    environment: production
    steps:
      - name: Roll out ${{ needs.build.outputs.ref }} to prod
        run: |
          IMG="${{ needs.build.outputs.ref }}"
          # Same in-cluster scoped-SA runner model as dev (a prod runner + cluster are future work).
          kubectl -n gua set image deployment/gua-matrix-authentication-service matrix-authentication-service="$IMG"
          kubectl -n gua rollout status deployment/gua-matrix-authentication-service --timeout=180s
